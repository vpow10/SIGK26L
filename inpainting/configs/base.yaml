project_name: "inpainting_mini_project"
seed: 47

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  splits: "data/splits"
  checkpoints: "results/checkpoints"
  logs: "results/logs"
  figures: "results/figures"

data:
  image_size: 256
  channels: 3

train:
  batch_size: 8
  num_workers: 2
  epochs: 30
  learning_rate: 0.001
  device: "cuda"

mask:
  size: 32

model:
  in_channels: 4
  out_channels: 3
  base_channels: 64

eval:
  save_visualizations: true