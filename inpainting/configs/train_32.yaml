project_name: "inpainting_mini_project"
seed: 47

paths:
  data_train_root: "data/raw/DIV2K_train_LR_bicubic"
  data_test_root: "data/raw/DIV2K_valid_LR_bicubic"
  data_processed: "data/processed"
  splits: "data/splits"
  checkpoints: "results/checkpoints"
  logs: "results/logs"
  figures: "results/figures"

data:
  image_size: 256
  channels: 3
  file_extensions: [".png", ".jpg", ".jpeg", ".bmp"]
  train_ratio_within_train_root: 0.9
  val_ratio_within_train_root: 0.1
  crop_mode_train: "random"
  crop_mode_eval: "center"

train:
  batch_size: 8
  num_workers: 2
  epochs: 30
  learning_rate: 0.001
  device: "cuda"
  save_every: 1

mask:
  size: 32

model:
  name: "unet"
  in_channels: 4
  out_channels: 3
  base_channels: 64

loss:
  hole_weight: 1.0
  valid_weight: 0.1

eval:
  save_visualizations: true